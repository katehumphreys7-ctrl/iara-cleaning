<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GHL embed test</title></head>
<body style="margin:0;background:#cccccc">
<div style="background:#222;color:#fff;padding:8px;font-family:sans-serif">Simulated GoHighLevel page — above the embed</div>
<iframe id="iara-embed" src="https://katehumphreys7-ctrl.github.io/iara-cleaning/embed.html"
  title="Iara Cleaning" scrolling="no" style="width:100%;border:0;display:block;height:3500px"></iframe>
<div id="below" style="background:#222;color:#0f0;padding:8px;font-family:sans-serif">Simulated GoHighLevel footer — below the embed (should sit flush under the site, no gap/scrollbar)</div>
<script>
  window.__log=[];
  window.addEventListener('message', function(e){
    if (e.origin !== 'https://katehumphreys7-ctrl.github.io') return;
    if (e.data && typeof e.data.iaraHeight === 'number'){
      window.__log.push(e.data.iaraHeight);
      document.getElementById('iara-embed').style.height = e.data.iaraHeight + 'px';
    }
  });
</script>
</body></html>
